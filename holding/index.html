<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow, noarchive" />
    <title>Private preview</title>
    <style>
      :root {
        color: #10242b;
        background: #f3efe6;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
      }

      main {
        width: min(36rem, calc(100% - 3rem));
        padding: 2.5rem;
        background: #fbfaf6;
        border: 1px solid rgba(16, 36, 43, 0.16);
        border-radius: 1rem;
      }

      p {
        color: #66747a;
        line-height: 1.6;
      }

      h1 {
        margin: 0 0 1rem;
        font-family: Georgia, serif;
        font-size: clamp(2.2rem, 7vw, 4rem);
        font-weight: 500;
        letter-spacing: -0.05em;
        line-height: 0.95;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Private preview in progress.</h1>
      <p>This site is being prepared and is not yet publicly available.</p>
    </main>
  </body>
</html>
